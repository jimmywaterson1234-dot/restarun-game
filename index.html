<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resto Tycoon Diamond Edition</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        .ui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        #hud { position: fixed; top: 15px; left: 15px; font-size: 24px; color: #f1c40f; font-weight: bold; }
        
        #res-box { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 8px; border-radius: 10px; pointer-events: auto; display: flex; gap: 10px; border: 2px solid #555; }
        .res-col { text-align: center; font-size: 10px; }
        .res-num { font-size: 16px; font-weight: bold; display: block; color: #2ecc71; }
        .buy-btn { background: #f1c40f; border: none; padding: 4px 6px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        #diamond-ui { position: fixed; top: 70px; right: 15px; display: none; text-align: center; }
        #diamond-icon { font-size: 40px; }
        #diamond-timer { font-size: 18px; color: #00d2ff; font-weight: bold; }

        #joy-base { position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.3); pointer-events: auto; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; }

        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #333; border: 3px solid #f1c40f; padding: 20px; display: none; pointer-events: auto; text-align: center; border-radius: 10px; z-index: 500; }
        #hit-btn { position: fixed; bottom: 40px; right: 40px; width: 80px; height: 80px; background: #c0392b; border-radius: 50%; display: none; align-items: center; justify-content: center; pointer-events: auto; border: 3px solid white; font-weight: bold; }
        
        .menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; pointer-events: auto; }
    </style>
</head>
<body>

<div id="start-menu" class="menu">
    <h1 style="color:#00d2ff">DIAMOND RESTO</h1>
    <button style="padding:15px 50px; background:#27ae60; color:white; border:none; border-radius:10px; font-size:20px; cursor:pointer;" onclick="startGame()">ИГРАТЬ</button>
</div>

<div id="pop-v" class="popup">
    <h3>ВЫШИБАЛА!</h3><p>Давай $20 или БУМ!</p>
    <button onclick="payV(true)" style="background:green; color:white; padding:10px; border-radius:5px;">ПЛАТИТЬ</button>
    <button onclick="payV(false)" style="background:red; color:white; padding:10px; border-radius:5px;">НЕТ</button>
</div>

<div class="ui">
    <div id="hud">$ <span id="balance">150</span></div>
    <div id="res-box">
        <div class="res-col">🥗<span id="val-s" class="res-num">10</span><button class="buy-btn" onclick="buy('s')">$10</button></div>
        <div class="res-col">🧀<span id="val-c" class="res-num">10</span><button class="buy-btn" onclick="buy('c')">$12</button></div>
        <div class="res-col">🥩<span id="val-m" class="res-num">10</span><button class="buy-btn" onclick="buy('m')">$15</button></div>
    </div>
    
    <div id="diamond-ui">
        <div id="diamond-icon">💎</div>
        <div id="diamond-timer">10s</div>
    </div>

    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="hit-btn" onclick="hit()">УДАР!</div>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let money = 150, isStarted = false, res = {s:10, c:10, m:10};
let hasBat = false, hitAnim = 0, kills = 0;
let diamondActive = 0, diamondObj = null;

// Размеры ресторана (как раньше)
const room = { x: 50, y: 100, w: 800, h: 500 };
const player = { x: 400, y: 350, r: 15, speed: 5 };
const items = {
    kassa: { lvl: 1, cost: 50, x: 100, y: 320, w: 60, h: 60, name: "Касса", col: "#f1c40f" },
    t1: { lvl: 0, cost: 40, x: 350, y: 180, w: 80, h: 80, name: "Стол 1", col: "#e67e22", status: 'free' },
    t2: { lvl: 0, cost: 40, x: 600, y: 180, w: 80, h: 80, name: "Стол 2", col: "#e67e22", status: 'free' },
    t3: { lvl: 0, cost: 40, x: 350, y: 420, w: 80, h: 80, name: "Стол 3", col: "#e67e22", status: 'free' }
};
let clients = [];

// Джойстик
let joy = { x: 0, y: 0, active: false };
const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');

jBase.addEventListener('touchstart', () => joy.active = true);
window.addEventListener('touchmove', (e) => {
    if(!joy.active) return;
    let r = jBase.getBoundingClientRect(), cx = r.left + 50, cy = r.top + 50;
    let dx = e.touches[0].clientX - cx, dy = e.touches[0].clientY - cy;
    let d = Math.min(Math.hypot(dx,dy), 50), a = Math.atan2(dy,dx);
    joy.x = Math.cos(a)*(d/50); joy.y = Math.sin(a)*(d/50);
    jStick.style.transform = `translate(${joy.x*35}px, ${joy.y*35}px)`;
});
window.addEventListener('touchend', () => { joy.active = false; joy.x = 0; joy.y = 0; jStick.style.transform = 'none'; });

function buy(t) { 
    let p = {s:10, c:12, m:15}; 
    if(money >= p[t]) { money -= p[t]; res[t]+=10; updateUI(); } 
}
function updateUI() {
    document.getElementById('balance').innerText = Math.floor(money);
    document.getElementById('val-s').innerText = res.s;
    document.getElementById('val-c').innerText = res.c;
    document.getElementById('val-m').innerText = res.m;
}

function payV(ok) {
    document.getElementById('pop-v').style.display = 'none';
    if(!ok) { alert("БА-БАХ!"); location.reload(); } else money = Math.max(0, money-20);
    updateUI();
}

function hit() {
    hitAnim = 10;
    let target = clients.find(c => Math.hypot(c.x-player.x, c.y-player.y) < 60);
    if(target) {
        if(target.target) target.target.status = 'free';
        clients = clients.filter(cl => cl !== target);
        kills++; if(kills >= 5) alert("КОНЦОВКА: УБИЙЦА");
    }
}

function spawnDiamond() {
    if(!isStarted) return;
    diamondObj = { x: room.x + Math.random()*(room.w-40), y: room.y + Math.random()*(room.h-40) };
    setTimeout(spawnDiamond, 20000);
}

function startGame() {
    document.getElementById('start-menu').style.display = 'none';
    isStarted = true;
    setInterval(() => {
        if(!isStarted) return;
        res.s = Math.max(0, res.s-1); res.c = Math.max(0, res.c-1); res.m = Math.max(0, res.m-1);
        if(diamondActive > 0) diamondActive--;
        updateUI();
    }, 1000);

    setInterval(() => {
        let freeT = Object.values(items).find(i => i.lvl > 0 && i.status === 'free' && i.name.includes("Стол"));
        if(isStarted && freeT && res.s>0 && res.c>0 && res.m>0) {
            freeT.status = 'busy';
            let isV = Math.random() < 0.15;
            clients.push({ x: -20, y: 350, state: 'toTable', target: freeT, isV: isV, timer: 180 });
        }
    }, 4500);
    
    spawnDiamond();
    loop();
}

function update() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    
    // Движение и ГРАНИЦЫ
    let nextX = player.x + joy.x * player.speed;
    let nextY = player.y + joy.y * player.speed;
    if(nextX > room.x + 15 && nextX < room.x + room.w - 15) player.x = nextX;
    if(nextY > room.y + 15 && nextY < room.y + room.h - 15) player.y = nextY;

    // Алмаз
    if(diamondObj && Math.hypot(player.x - diamondObj.x, player.y - diamondObj.y) < 30) {
        diamondActive = 10; diamondObj = null;
    }

    clients.forEach((c, idx) => {
        if(c.state === 'toTable') {
            c.x += (c.target.x - c.x)*0.03; c.y += (c.target.y - c.y)*0.03;
            if(Math.hypot(c.x-c.target.x, c.y-c.target.y)<5) {
                c.state = 'eating';
                if(c.isV) document.getElementById('pop-v').style.display = 'block';
            }
        } else if(c.state === 'eating') {
            c.timer--; 
            if(c.timer <= 0) { c.state = 'toKassa'; c.target.status = 'free'; }
        } else if(c.state === 'toKassa') {
            c.x += (items.kassa.x + 30 - c.x)*0.05; c.y += (items.kassa.y + 30 - c.y)*0.05;
            if(Math.hypot(c.x-(items.kassa.x+30), c.y-(items.kassa.y+30))<5) {
                money += (diamondActive > 0 ? 60 : 30);
                c.state = 'leaving';
                updateUI();
            }
        } else { c.x -= 4; if(c.x < -30) clients.splice(idx,1); }
    });

    if(!hasBat && player.x > 800 && player.y > 550) {
        hasBat = true; document.getElementById('hit-btn').style.display = 'flex';
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    
    // Эффект алмаза (мигание)
    if(diamondActive > 0) {
        document.getElementById('diamond-ui').style.display = 'block';
        document.getElementById('diamond-timer').innerText = diamondActive + "s";
        ctx.fillStyle = `rgba(0, 210, 255, ${Math.sin(Date.now()/200)*0.1 + 0.1})`;
        ctx.fillRect(0,0,canvas.width,canvas.height);
    } else {
        document.getElementById('diamond-ui').style.display = 'none';
    }

    // Ресторан
    ctx.fillStyle = "#333"; ctx.fillRect(room.x, room.y, room.w, room.h);
    ctx.strokeStyle = "#555"; ctx.lineWidth = 5; ctx.strokeRect(room.x, room.y, room.w, room.h);

    for(let k in items) {
        let it = items[k];
        ctx.fillStyle = it.lvl === 0 ? "#222" : it.col;
        ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.fillStyle = "white"; ctx.font = "bold 12px Arial";
        ctx.fillText(it.name + " ["+it.lvl+"]", it.x, it.y - 10);
    }

    if(diamondObj) {
        ctx.fillStyle = "#00d2ff"; ctx.fillRect(diamondObj.x, diamondObj.y, 20, 20);
        ctx.strokeStyle = "white"; ctx.strokeRect(diamondObj.x, diamondObj.y, 20, 20);
    }

    clients.forEach(c => {
        ctx.fillStyle = c.isV ? "red" : "#54a0ff";
        ctx.beginPath(); ctx.arc(c.x, c.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.fillText(":)", c.x-7, c.y+5); // Рожица клиента
    });

    // Игрок
    ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "black"; ctx.fillText(hitAnim > 0 ? ";)" : ":)", player.x-7, player.y+5); // Рожица игрока
    
    if(hasBat) {
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(hitAnim > 0 ? 0.8 : -0.5);
        ctx.fillStyle = "#f1c40f"; ctx.fillRect(15, -20, 6, 30); ctx.restore();
        if(hitAnim > 0) hitAnim--;
    }
}

canvas.onclick = e => {
    Object.values(items).forEach(it => {
        if(e.clientX > it.x && e.clientX < it.x+it.w && e.clientY > it.y && e.clientY < it.y+it.h+30) {
            if(money >= it.cost && it.lvl < 20) {
                money -= it.cost; it.lvl++; it.cost = Math.floor(it.cost * 1.5); updateUI();
            }
        }
    });
};

function loop() { if(!isStarted) return; update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
