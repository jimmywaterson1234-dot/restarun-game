<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Restaurant Tycoon: Pro Edition</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        canvas { display: block; }
        .ui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        
        /* Склад продуктов */
        #res-bar { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; pointer-events: auto; display: flex; gap: 15px; border: 2px solid #555; align-items: center; }
        .res-item { text-align: center; min-width: 60px; }
        .res-val { font-weight: bold; font-size: 18px; display: block; }
        .buy-btn { background: #27ae60; color: white; border: none; border-radius: 4px; padding: 4px 8px; cursor: pointer; font-size: 12px; margin-top: 5px; }
        .buy-btn:active { background: #2ecc71; }
        #res-timer { text-align: center; color: #ff4757; font-size: 14px; font-weight: bold; margin-top: 2px; }

        #hud { position: fixed; top: 15px; left: 15px; font-size: 20px; color: #f1c40f; text-shadow: 2px 2px #000; }
        #timer-ui { position: fixed; top: 15px; right: 15px; font-size: 20px; color: #fff; }
        
        .menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 3000; flex-direction: column; }
        .leaderboard { margin-top: 15px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; width: 250px; }
        .leader-item { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 3px 0; font-size: 14px; }
        
        .dialog-box { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 3px solid #f1c40f; padding: 20px; display: none; pointer-events: auto; text-align: center; border-radius: 10px; z-index: 2000; }
        #joy-base { position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; display: none; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #fff; border-radius: 50%; opacity: 0.5; }
        .white-screen { position: fixed; inset: 0; background: white; display: none; align-items: center; justify-content: center; z-index: 5000; color: #000; flex-direction: column; }
    </style>
</head>
<body>

<div id="start-menu" class="menu">
    <h1 style="color:#f1c40f">RESTO TYCOON PRO</h1>
    <input type="text" id="pName" placeholder="Ник" style="padding:10px; border-radius:5px; border:none; margin-bottom:10px;">
    <button onclick="startGame()" style="padding:15px 40px; background:#27ae60; color:white; border:none; border-radius:10px; font-size:18px; font-weight:bold;">ИГРАТЬ</button>
    <div class="leaderboard">
        <h3 style="margin:0; text-align:center; color:#f1c40f">ТОП ЛИДЕРОВ</h3>
        <div id="leader-list">Загрузка...</div>
    </div>
</div>

<div id="ending" class="white-screen">
    <h1 id="end-title">ПОБЕДА!</h1>
    <h2 id="final-time"></h2>
    <button onclick="location.reload()" style="padding:10px 20px;">В МЕНЮ</button>
</div>

<div class="ui">
    <div id="hud">$ <span id="balance">0</span></div>
    
    <div id="res-bar">
        <div class="res-item">
            <span>🥗 Салат</span>
            <span class="res-val" id="val-salad">5</span>
            <button class="buy-btn" onclick="buyRes('salad')">+$10</button>
        </div>
        <div class="res-item">
            <span>🧀 Сыр</span>
            <span class="res-val" id="val-cheese">5</span>
            <button class="buy-btn" onclick="buyRes('cheese')">+$12</button>
        </div>
        <div class="res-item">
            <span>🥩 Колб.</span>
            <span class="res-val" id="val-meat">5</span>
            <button class="buy-btn" onclick="buyRes('meat')">+$15</button>
        </div>
        <div style="border-left: 1px solid #444; padding-left: 10px;">
            <div id="res-timer">15s</div>
            <div style="font-size: 10px; color: #aaa;">ДО РАСХОДА</div>
        </div>
    </div>

    <div id="timer-ui">⏱ <span id="timer-val">0</span>с</div>
    <div id="joy-base"><div id="joy-stick"></div></div>
</div>

<canvas id="game"></canvas>

<script>
const MY_ID = '3cd0e84787ad89d5aa8f'; 
const URL = `https://api.npoint.io/${MY_ID}`;

// Ресурсы
let resData = { salad: 5, cheese: 5, meat: 5 };
let resTimer = 15;

async function loadGlobalLeaderboard() {
    try {
        const res = await fetch(URL + "?t=" + Date.now());
        const runs = await res.json();
        if (Array.isArray(runs)) {
            runs.sort((a, b) => a.time - b.time);
            document.getElementById('leader-list').innerHTML = runs.slice(0, 5).map((r, i) => 
                `<div class="leader-item"><span>${i+1}. ${r.name}</span> <b>${r.time}s</b></div>`
            ).join('');
        }
    } catch (e) { document.getElementById('leader-list').innerHTML = "Играй первым!"; }
}

async function saveGlobalRun(seconds) {
    try {
        const resGet = await fetch(URL + "?t=" + Date.now());
        let runs = await resGet.json();
        if (!Array.isArray(runs)) runs = [];
        runs.push({ name: playerName, time: seconds });
        runs.sort((a, b) => a.time - b.time);
        await fetch(URL, { method: 'POST', body: JSON.stringify(runs.slice(0, 10)) });
    } catch (e) { console.log(e); }
}

function buyRes(type) {
    let prices = { salad: 10, cheese: 12, meat: 15 };
    if (money >= prices[type]) {
        money -= prices[type];
        resData[type] += 5;
        updateResUI();
    }
}

function updateResUI() {
    document.getElementById('val-salad').innerText = resData.salad;
    document.getElementById('val-cheese').innerText = resData.cheese;
    document.getElementById('val-meat').innerText = resData.meat;
    document.getElementById('balance').innerText = Math.floor(money);
}

// Логика игры
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let isStarted = false, money = 50, playerName = "", totalLvl = 0;
const rest = { x: 50, y: 100, w: 900, h: 550 };
const player = { x: 450, y: 350, r: 18, speed: 6 };
const joy = { active: false, dx: 0, dy: 0 };

let items = {
    kassa: { lvl: 0, cost: 30, x: 80, y: 350, w: 70, h: 70, name: "Касса", col: "#f1c40f" },
    kuhnya: { lvl: 0, cost: 50, x: 80, y: 150, w: 100, h: 80, name: "Кухня", col: "#95a5a6" },
    t1: { lvl: 0, cost: 40, x: 400, y: 180, w: 80, h: 80, name: "Стол 1", col: "#e67e22", busy: false },
    t2: { lvl: 0, cost: 40, x: 700, y: 180, w: 80, h: 80, name: "Стол 2", col: "#e67e22", busy: false },
    t3: { lvl: 0, cost: 40, x: 400, y: 450, w: 80, h: 80, name: "Стол 3", col: "#e67e22", busy: false },
    t4: { lvl: 0, cost: 40, x: 700, y: 450, w: 80, h: 80, name: "Стол 4", col: "#e67e22", busy: false }
};

let clients = [];

function startGame() {
    playerName = document.getElementById('pName').value || "Игрок";
    document.getElementById('start-menu').style.display = 'none';
    isStarted = true;
    startTime = Date.now();
    
    // Цикл ресурсов (каждые 15 сек)
    setInterval(() => {
        if (!isStarted) return;
        resTimer--;
        document.getElementById('res-timer').innerText = resTimer + "s";
        if (resTimer <= 0) {
            resData.salad = Math.max(0, resData.salad - 1);
            resData.cheese = Math.max(0, resData.cheese - 1);
            resData.meat = Math.max(0, resData.meat - 1);
            resTimer = 15;
            updateResUI();
        }
    }, 1000);

    // Доход и спавн
    setInterval(() => {
        if(isStarted) {
            money += (1 + totalLvl * 0.5);
            updateResUI();
            document.getElementById('timer-val').innerText = Math.floor((Date.now() - startTime)/1000);
        }
    }, 1000);

    setInterval(() => {
        // Спавним только если есть еда
        if(isStarted && resData.salad > 0 && resData.cheese > 0 && resData.meat > 0) {
            spawnClient();
        }
    }, 6000);

    loop();
}

function spawnClient() {
    clients.push({ x: -30, y: 380, state: 'walking', target: null, wait: 120 });
}

function loop() { if(!isStarted) return; update(); draw(); requestAnimationFrame(loop); }

function update() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    // Управление (упрощено)
    if(joy.active) { player.x += joy.dx*player.speed; player.y += joy.dy*player.speed; }
    
    clients.forEach(c => {
        if (c.state === 'walking') {
            c.x += 1.5;
            let t = Object.values(items).find(i => i.name.includes("Стол") && i.lvl > 0 && !i.busy);
            if(t) { t.busy = true; c.target = t; c.state = 'toTable'; }
        } else if (c.state === 'toTable') {
            c.x += (c.target.x - c.x)*0.05; c.y += (c.target.y - c.y)*0.05;
            if(Math.hypot(c.x-c.target.x, c.y-c.target.y)<5) c.state = 'eating';
        } else if (c.state === 'eating') {
            c.wait--; if(c.wait<=0) { c.target.busy = false; c.state = 'leaving'; money += 10; }
        } else if (c.state === 'leaving') { c.x -= 3; }
    });

    if(Object.values(items).every(i => i.lvl >= 20)) win();
}

async function win() {
    isStarted = false;
    let time = Math.floor((Date.now()-startTime)/1000);
    document.getElementById('ending').style.display = 'flex';
    document.getElementById('final-time').innerText = time + " секунд";
    await saveGlobalRun(time);
}

function draw() {
    ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "#3d2b1f"; ctx.fillRect(rest.x, rest.y, rest.w, rest.h);
    
    for(let k in items) {
        let it = items[k];
        ctx.fillStyle = it.lvl > 0 ? it.col : "#222";
        ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.fillStyle = "#fff";
        ctx.fillText(`${it.name} [${it.lvl}/20]`, it.x, it.y - 10);
        if(it.lvl < 20) ctx.fillText(`$${it.cost}`, it.x, it.y + it.h + 20);
    }
    
    clients.forEach(c => { ctx.fillStyle = "#54a0ff"; ctx.beginPath(); ctx.arc(c.x,c.y,15,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x,player.y,player.r,0,Math.PI*2); ctx.fill();
}

canvas.onclick = e => {
    for(let k in items) {
        let it = items[k];
        if(e.clientX > it.x && e.clientX < it.x + it.w && e.clientY > it.y && e.clientY < it.y + it.h + 30) {
            if(money >= it.cost && it.lvl < 20) {
                money -= it.cost; it.lvl++; totalLvl++;
                it.cost = Math.floor(it.cost * 1.3);
                updateResUI();
            }
        }
    }
};

loadGlobalLeaderboard();
</script>
</body>
</html>
