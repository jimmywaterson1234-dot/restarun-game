<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resto Tycoon Ultra</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        .ui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        
        #res-bar { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 10px; border-radius: 10px; pointer-events: auto; display: flex; gap: 15px; border: 2px solid #f1c40f; }
        .res-item { text-align: center; min-width: 70px; }
        .res-val { font-weight: bold; font-size: 20px; display: block; color: #2ecc71; }
        .buy-btn { background: #f1c40f; color: #000; border: none; border-radius: 5px; padding: 5px; cursor: pointer; font-size: 11px; font-weight: bold; width: 100%; margin-top: 5px; }
        
        #hud { position: fixed; top: 15px; left: 15px; font-size: 24px; color: #f1c40f; text-shadow: 2px 2px #000; }
        #timer-ui { position: fixed; top: 15px; right: 15px; font-size: 20px; }
        #res-timer-display { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); color: #ff4757; font-weight: bold; width: 200px; text-align: center; }

        .menu { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 3000; flex-direction: column; }
        #leader-list { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; width: 250px; margin-top: 10px; }
        
        /* Кнопки для телефона */
        #mobile-controls { position: fixed; bottom: 30px; right: 30px; display: none; pointer-events: auto; }
        .move-btn { width: 60px; height: 60px; background: rgba(255,255,255,0.2); border-radius: 10px; margin: 5px; display: inline-flex; align-items: center; justify-content: center; font-size: 30px; }
    </style>
</head>
<body>

<div id="start-menu" class="menu">
    <h1 style="color:#f1c40f">RESTO TYCOON ULTRA</h1>
    <input type="text" id="pName" placeholder="Твой ник" style="padding:12px; width:200px; margin-bottom:15px; border-radius:8px;">
    <button onclick="startGame()" style="padding:15px 50px; background:#2ecc71; color:white; border:none; border-radius:10px; font-size:20px; cursor:pointer;">ИГРАТЬ</button>
    <div id="leader-list">Загрузка рекордов...</div>
</div>

<div class="ui">
    <div id="hud">$ <span id="balance">50</span></div>
    
    <div id="res-bar">
        <div class="res-item">🥗 <span id="val-salad" class="res-val">10</span><button class="buy-btn" onclick="buyRes('salad')">КУПИТЬ $10</button></div>
        <div class="res-item">🧀 <span id="val-cheese" class="res-val">10</span><button class="buy-btn" onclick="buyRes('cheese')">КУПИТЬ $12</button></div>
        <div class="res-item">🥩 <span id="val-meat" class="res-val">10</span><button class="buy-btn" onclick="buyRes('meat')">КУПИТЬ $15</button></div>
        <div id="res-timer-display">ДО РАСХОДА: <span id="res-sec">10</span>с</div>
    </div>

    <div id="timer-ui">⏱ <span id="timer-val">0</span>с</div>
</div>

<canvas id="game"></canvas>

<script>
const MY_ID = '3cd0e84787ad89d5aa8f'; 
const URL = `https://api.npoint.io/${MY_ID}`;

let money = 100, isStarted = false, playerName = "", startTime = 0;
let resData = { salad: 10, cheese: 10, meat: 10 };
let resTicks = 10;

// Управление (ПК и Телефон)
const keys = {};
window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

const player = { x: 450, y: 350, r: 18, speed: 5 };
const items = {
    kassa: { lvl: 1, cost: 50, x: 80, y: 300, w: 60, h: 60, name: "Касса", col: "#f1c40f" },
    kuhnya: { lvl: 1, cost: 80, x: 80, y: 150, w: 90, h: 70, name: "Кухня", col: "#95a5a6" },
    t1: { lvl: 0, cost: 40, x: 400, y: 180, w: 70, h: 70, name: "Стол 1", col: "#e67e22", state: 'free' },
    t2: { lvl: 0, cost: 40, x: 650, y: 180, w: 70, h: 70, name: "Стол 2", col: "#e67e22", state: 'free' },
    t3: { lvl: 0, cost: 40, x: 400, y: 400, w: 70, h: 70, name: "Стол 3", col: "#e67e22", state: 'free' },
    t4: { lvl: 0, cost: 40, x: 650, y: 400, w: 70, h: 70, name: "Стол 4", col: "#e67e22", state: 'free' }
};

let clients = [];
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function buyRes(type) {
    let p = { salad: 10, cheese: 12, meat: 15 };
    if(money >= p[type]) { money -= p[type]; resData[type] += 10; updateUI(); }
}

function updateUI() {
    document.getElementById('balance').innerText = Math.floor(money);
    document.getElementById('val-salad').innerText = resData.salad;
    document.getElementById('val-cheese').innerText = resData.cheese;
    document.getElementById('val-meat').innerText = resData.meat;
}

function startGame() {
    playerName = document.getElementById('pName').value || "Игрок";
    document.getElementById('start-menu').style.display = 'none';
    isStarted = true;
    startTime = Date.now();
    
    // Таймер расхода еды (каждую секунду -1, каждые 10 сек сброс)
    setInterval(() => {
        if(!isStarted) return;
        resTicks--;
        // Каждую секунду тратим
        resData.salad = Math.max(0, resData.salad - 1);
        resData.cheese = Math.max(0, resData.cheese - 1);
        resData.meat = Math.max(0, resData.meat - 1);
        
        if(resTicks <= 0) resTicks = 10;
        document.getElementById('res-sec').innerText = resTicks;
        updateUI();
    }, 1000);

    // Доход
    setInterval(() => { if(isStarted) money += 1; }, 2000);

    // Спавн клиентов (только если есть еда и столы)
    setInterval(() => {
        let freeTable = Object.values(items).find(i => i.name.includes("Стол") && i.lvl > 0 && i.state === 'free');
        let hasFood = resData.salad > 0 && resData.cheese > 0 && resData.meat > 0;
        if(isStarted && freeTable && hasFood) {
            clients.push({ x: -20, y: 330, state: 'toTable', target: freeTable });
            freeTable.state = 'busy';
        }
    }, 5000);

    loop();
}

function loop() {
    if(!isStarted) return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;

    // Движение ПК (WASD / Стрелки)
    if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    // Движение Телефон (Клик в сторону)
    canvas.ontouchstart = e => {
        let tx = e.touches[0].clientX; let ty = e.touches[0].clientY;
        if(tx < player.x) player.x -= 10; else player.x += 10;
        if(ty < player.y) player.y -= 10; else player.y += 10;
    };

    clients.forEach((c, idx) => {
        if(c.state === 'toTable') {
            c.x += (c.target.x - c.x)*0.03; c.y += (c.target.y - c.y)*0.03;
            if(Math.hypot(c.x-c.target.x, c.y-c.target.y)<5) {
                c.state = 'eating';
                setTimeout(() => { 
                    c.state = 'leaving'; 
                    c.target.state = 'dirty'; // Новая фишка: стол грязный
                    money += 25;
                }, 4000);
            }
        } else if(c.state === 'leaving') {
            c.x -= 4;
            if(c.x < -50) clients.splice(idx, 1);
        }
    });

    // Уборка столов (подойди вплотную)
    Object.values(items).forEach(it => {
        if(it.state === 'dirty' && Math.hypot(player.x - (it.x+it.w/2), player.y - (it.y+it.h/2)) < 50) {
            it.state = 'free';
        }
    });

    if(Object.values(items).every(i => i.lvl >= 20)) alert("ПОБЕДА!");
}

function draw() {
    ctx.fillStyle = "#111"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    // Отрисовка мебели
    for(let k in items) {
        let it = items[k];
        ctx.fillStyle = it.lvl === 0 ? "#222" : (it.state === 'dirty' ? "#4d3319" : it.col);
        ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.fillStyle = "#fff"; ctx.font = "14px Arial";
        ctx.fillText(`${it.name} [${it.lvl}/20]`, it.x, it.y - 10);
        if(it.state === 'dirty') ctx.fillText("ГРЯЗНО! (Подойди)", it.x, it.y + it.h/2);
    }

    // Клиенты
    clients.forEach(c => {
        ctx.fillStyle = "#54a0ff"; ctx.beginPath(); ctx.arc(c.x, c.y, 15, 0, Math.PI*2); ctx.fill();
    });

    // Игрок
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 3; ctx.stroke();
}

canvas.onclick = e => {
    Object.values(items).forEach(it => {
        if(e.clientX > it.x && e.clientX < it.x+it.w && e.clientY > it.y && e.clientY < it.y+it.h+40) {
            if(money >= it.cost && it.lvl < 20) {
                money -= it.cost; it.lvl++; it.cost = Math.floor(it.cost * 1.4);
                updateUI();
            }
        }
    });
};

async function loadLeaderboard() {
    try {
        const res = await fetch(URL + "?t=" + Date.now());
        const data = await res.json();
        if(Array.isArray(data)) {
            document.getElementById('leader-list').innerHTML = data.slice(0,5).map((r,i) => `<div>${i+1}. ${r.name} - ${r.time}с</div>`).join('');
        }
    } catch(e) { document.getElementById('leader-list').innerHTML = "Будь первым!"; }
}
loadLeaderboard();
</script>
</body>
</html>
