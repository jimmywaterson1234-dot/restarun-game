<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resto Tycoon Classic Online</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: Arial, sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        .ui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        
        /* Меню как в оригинале */
        #start-menu { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #play-btn { padding: 15px 50px; background: #27ae60; color: white; border: none; font-size: 24px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        
        /* Таблица ТОП-5 */
        #leaderboard { background: #111; border: 1px solid #444; padding: 10px; width: 250px; text-align: center; font-size: 14px; }
        .score-item { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px solid #222; }

        /* Игровой HUD */
        #hud { position: fixed; top: 10px; left: 10px; font-size: 22px; color: #f1c40f; }
        #res-box { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; pointer-events: auto; border: 1px solid #555; }
        .res-row { margin-bottom: 5px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .buy-btn { background: #f1c40f; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; }

        /* Управление для телефона */
        #joy-base { position: fixed; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joy-stick { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.3); border-radius: 50%; }
        #hit-btn { position: fixed; bottom: 40px; right: 40px; width: 80px; height: 80px; background: #e74c3c; border-radius: 50%; display: none; align-items: center; justify-content: center; pointer-events: auto; font-weight: bold; border: 2px solid #fff; }

        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid #f1c40f; padding: 20px; display: none; pointer-events: auto; text-align: center; z-index: 500; }
    </style>
</head>
<body>

<div id="start-menu">
    <h1 style="color:#f1c40f">RESTO TYCOON</h1>
    <button id="play-btn" onclick="startGame()">ИГРАТЬ</button>
    <div id="leaderboard">
        <div style="color:#00d2ff; margin-bottom:5px;">🏆 МИРОВОЙ ТОП-5</div>
        <div id="top-list">Загрузка...</div>
    </div>
</div>

<div id="pop-v" class="popup">
    <h2 style="color:red">ВЫШИБАЛА!</h2>
    <p>Плати $20 или всё взорву!</p>
    <button onclick="payV(true)" style="background:green; color:white; padding:10px;">ПЛАТИТЬ</button>
    <button onclick="payV(false)" style="background:red; color:white; padding:10px;">ОТКАЗАТЬ</button>
</div>

<div class="ui">
    <div id="hud">$ <span id="balance">150</span></div>
    <div id="res-box">
        <div class="res-row">🥗 <span id="v-s">15</span> <button class="buy-btn" onclick="buy('s')">$5</button></div>
        <div class="res-row">🧀 <span id="v-c">15</span> <button class="buy-btn" onclick="buy('c')">$7</button></div>
        <div class="res-row">🥩 <span id="v-m">15</span> <button class="buy-btn" onclick="buy('m')">$10</button></div>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="hit-btn" onclick="hit()">УДАР!</div>
</div>

<canvas id="game"></canvas>

<script>
// --- КОНФИГ FIREBASE (Вставь свои данные) ---
const firebaseConfig = {
    apiKey: "ТВОЙ_API_KEY",
    databaseURL: "ТВОЯ_ССЫЛКА"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function loadTop5() {
    db.ref('records').orderByValue().limitToLast(5).on('value', (s) => {
        const list = document.getElementById('top-list');
        list.innerHTML = "";
        let arr = [];
        s.forEach(c => { arr.push({n: c.key, s: c.val()}); });
        arr.reverse().forEach((p, i) => {
            list.innerHTML += `<div class="score-item"><span>${i+1}. ${p.n}</span><b>$${p.s}</b></div>`;
        });
    });
}
loadTop5();

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let money = 150, res = {s:15, c:15, m:15}, isStarted = false;
let hasBat = false, hitAnim = 0, kills = 0;

const room = { x: 50, y: 80, w: 800, h: 500 };
const player = { x: 400, y: 300, r: 18, speed: 5 };
const items = {
    kassa: { lvl: 1, cost: 50, x: 80, y: 300, w: 60, h: 60, name: "Касса", col: "#f1c40f" },
    t1: { lvl: 0, cost: 40, x: 300, y: 150, w: 80, h: 80, name: "Стол 1", col: "#e67e22", status: 'free' },
    t2: { lvl: 0, cost: 40, x: 550, y: 150, w: 80, h: 80, name: "Стол 2", col: "#e67e22", status: 'free' },
    t3: { lvl: 0, cost: 40, x: 300, y: 400, w: 80, h: 80, name: "Стол 3", col: "#e67e22", status: 'free' }
};
let clients = [], NPCs = [{ x: 750, y: 130, type: 'andryusha', name: "Андрюша", timer: 0 }];

// Управление
let joy = { x: 0, y: 0, active: false };
const jBase = document.getElementById('joy-base'), jStick = document.getElementById('joy-stick');
jBase.addEventListener('touchstart', () => joy.active = true);
window.addEventListener('touchmove', (e) => {
    if(!joy.active) return;
    let r = jBase.getBoundingClientRect(), cx = r.left+50, cy = r.top+50;
    let dx = e.touches[0].clientX-cx, dy = e.touches[0].clientY-cy;
    let d = Math.min(Math.hypot(dx,dy), 50), a = Math.atan2(dy,dx);
    joy.x = Math.cos(a)*(d/50); joy.y = Math.sin(a)*(d/50);
    jStick.style.transform = `translate(${joy.x*30}px, ${joy.y*30}px)`;
});
window.addEventListener('touchend', () => { joy.active = false; joy.x = 0; joy.y = 0; jStick.style.transform = 'none'; });

function buy(t) { 
    let p = {s:5, c:7, m:10}; 
    if(money >= p[t]) { money -= p[t]; res[t]+=20; updateUI(); } 
}

function updateUI() {
    document.getElementById('balance').innerText = Math.floor(money);
    document.getElementById('v-s').innerText = Math.floor(res.s);
    document.getElementById('v-c').innerText = Math.floor(res.c);
    document.getElementById('v-m').innerText = Math.floor(res.m);
}

function payV(ok) {
    document.getElementById('pop-v').style.display = 'none';
    if(!ok) { 
        let name = prompt("РЕСТОРАН ВЗОРВАН! Твой рекорд:", "Игрок");
        if(name) db.ref('records/'+name).set(Math.floor(money));
        location.reload(); 
    } else { money = Math.max(0, money-20); updateUI(); }
}

function hit() {
    hitAnim = 15;
    let target = clients.find(c => Math.hypot(c.x-player.x, c.y-player.y) < 60);
    if(target) {
        if(target.target) target.target.status = 'free';
        clients = clients.filter(cl => cl !== target);
        kills++; if(kills >= 10) { 
            let name = prompt("ТЫ АРЕСТОВАН! Твой рекорд:", "Игрок");
            if(name) db.ref('records/'+name).set(Math.floor(money));
            location.reload(); 
        }
    }
}

function startGame() {
    document.getElementById('start-menu').style.display = 'none';
    isStarted = true;
    updateUI();
    setInterval(() => {
        let freeT = Object.values(items).find(i => i.lvl > 0 && i.status === 'free');
        if(isStarted && freeT && res.s>=1 && res.c>=1 && res.m>=1) {
            freeT.status = 'busy';
            clients.push({ x: -30, y: 300, state: 'toTable', target: freeT, timer: 150, isV: Math.random()<0.15 });
        }
    }, 5000);
    loop();
}

function update() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let nX = player.x + joy.x * player.speed, nY = player.y + joy.y * player.speed;
    if(nX > room.x+20 && nX < room.x+room.w-20) player.x = nX;
    if(nY > room.y+20 && nY < room.y+room.h-20) player.y = nY;

    NPCs.forEach(npc => {
        if(npc.type==='andryusha' && Math.hypot(player.x-npc.x, player.y-npc.y)<40 && npc.timer<=0) {
            money+=25; npc.timer=600; updateUI();
        }
        if(npc.timer > 0) npc.timer--;
    });

    clients.forEach((c, idx) => {
        if(c.state==='toTable') {
            c.x+=(c.target.x-c.x)*0.04; c.y+=(c.target.y-c.y)*0.04;
            if(Math.hypot(c.x-c.target.x, c.y-c.target.y)<5) c.state='eating';
        } else if(c.state==='eating') {
            c.timer--; 
            if(c.timer<=0) { 
                // Еда тратится ТОЛЬКО когда клиент поел
                res.s--; res.c--; res.m--;
                c.state='toKassa'; c.target.status='free'; updateUI();
            }
        } else if(c.state==='toKassa') {
            c.x+=(items.kassa.x+30-c.x)*0.06; c.y+=(items.kassa.y+30-c.y)*0.06;
            if(Math.hypot(c.x-(items.kassa.x+30), c.y-(items.kassa.y+30))<5) {
                money+=50; c.state='leaving';
                if(c.isV) document.getElementById('pop-v').style.display='block';
                updateUI();
            }
        } else { c.x-=5; if(c.x<-50) clients.splice(idx,1); }
    });

    if(!hasBat && player.x > room.x+room.w-60 && player.y > room.y+room.h-60) {
        hasBat = true; document.getElementById('hit-btn').style.display='flex';
    }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle="#1a1a1a"; ctx.fillRect(room.x, room.y, room.w, room.h);
    ctx.strokeStyle="#333"; ctx.lineWidth=5; ctx.strokeRect(room.x, room.y, room.w, room.h);

    for(let k in items) {
        let it = items[k];
        ctx.fillStyle = it.lvl===0 ? "#000" : it.col;
        ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.fillStyle="white"; ctx.font="12px Arial"; ctx.fillText(it.name, it.x, it.y-5);
    }

    NPCs.forEach(n => {
        ctx.fillStyle=n.timer>0?"#333":"#9b59b6";
        ctx.beginPath(); ctx.arc(n.x, n.y, 20, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle="white"; ctx.fillText(n.name, n.x-25, n.y-25);
    });

    clients.forEach(c => {
        ctx.fillStyle=c.isV?"#e74c3c":"#3498db";
        ctx.beginPath(); ctx.arc(c.x, c.y, 18, 0, Math.PI*2); ctx.fill();
    });

    ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle="black"; ctx.fillText(hitAnim>0?";)":":)", player.x-8, player.y+5);
    
    if(hasBat) {
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(hitAnim>0?1:-0.7);
        ctx.fillStyle="#f1c40f"; ctx.fillRect(15, -25, 6, 30); ctx.restore();
        if(hitAnim>0) hitAnim--;
    }
}

canvas.onclick = e => {
    Object.values(items).forEach(it => {
        if(e.clientX > it.x && e.clientX < it.x+it.w && e.clientY > it.y && e.clientY < it.y+it.h+30) {
            if(money>=it.cost && it.lvl<20) { money-=it.cost; it.lvl++; it.cost=Math.floor(it.cost*1.6); updateUI(); }
        }
    });
};
function loop() { if(!isStarted) return; update(); draw(); requestAnimationFrame(loop); }
</script>
</body>
</html>
