<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Resto Tycoon PRO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; touch-action: none; }
        canvas { display: block; }
        .ui { position: fixed; inset: 0; pointer-events: none; z-index: 100; }
        
        #menu { position: fixed; inset: 0; background: radial-gradient(circle, #2c3e50, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; pointer-events: auto; }
        #play-btn { padding: 15px 60px; background: #27ae60; color: #fff; border: none; font-size: 24px; font-weight: bold; cursor: pointer; border-radius: 10px; box-shadow: 0 5px 0 #1e8449; }
        #resto-input { padding: 12px; font-size: 18px; text-align: center; margin-bottom: 15px; width: 260px; background: #222; border: 2px solid #f1c40f; color: #fff; border-radius: 5px; }
        
        #leaderboard { background: rgba(0,0,0,0.7); border: 1px solid #444; padding: 10px; width: 280px; margin-top: 20px; border-radius: 5px; }
        .score-line { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #333; font-size: 13px; }

        #stats-ui { position: fixed; top: 10px; left: 10px; pointer-events: none; }
        #m-display { font-size: 28px; color: #f1c40f; font-weight: bold; text-shadow: 2px 2px #000; }
        #t-display { font-size: 18px; color: #00d2ff; }
        
        #res-panel { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border: 1px solid #555; pointer-events: auto; border-radius: 5px; }
        .res-item { margin-bottom: 8px; font-size: 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .btn-buy { background: #f1c40f; border: none; padding: 5px 8px; font-weight: bold; cursor: pointer; border-radius: 3px; font-size: 12px; }

        #joy-base { position: fixed; bottom: 50px; left: 50px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); pointer-events: auto; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        #hit-btn { position: fixed; bottom: 60px; right: 50px; width: 90px; height: 90px; background: #e74c3c; border-radius: 50%; display: none; align-items: center; justify-content: center; pointer-events: auto; border: 4px solid #fff; font-weight: bold; color: white; }

        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; border: 3px solid #f1c40f; padding: 25px; display: none; pointer-events: auto; text-align: center; z-index: 2000; width: 280px; border-radius: 10px; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color:#f1c40f; font-size: 45px; margin-bottom: 10px; text-shadow: 3px 3px #000;">RESTO TYCOON</h1>
    <input type="text" id="resto-input" placeholder="Название ресторана..." maxlength="15">
    <button id="play-btn" onclick="initGame()">НАЧАТЬ ИГРУ</button>
    <div id="leaderboard"><div id="top-list">Загрузка рекордов...</div></div>
</div>

<div id="v-popup" class="popup">
    <h3 style="color:#e74c3c">ВЫШИБАЛА</h3>
    <p>Требует долю $20!</p>
    <button onclick="payV(true)" style="background:green; color:white; padding:10px; border:none; margin:5px; width:80%;">ПЛАТИТЬ</button>
    <button onclick="payV(false)" style="background:red; color:white; padding:10px; border:none; margin:5px; width:80%;">ОТКАЗАТЬ</button>
</div>

<div class="ui">
    <div id="stats-ui">
        <div id="m-display">$ <span id="m-val">150</span></div>
        <div id="t-display">⏱ <span id="t-val">0</span> сек</div>
    </div>
    <div id="res-panel">
        <div class="res-item">🥗 <span id="r-s">20</span> <button class="btn-buy" onclick="buyRes('s')">$5</button></div>
        <div class="res-item">🧀 <span id="r-c">20</span> <button class="btn-buy" onclick="buyRes('c')">$7</button></div>
        <div class="res-item">🥩 <span id="r-m">20</span> <button class="btn-buy" onclick="buyRes('m')">$10</button></div>
    </div>
    <div id="joy-base"><div id="joy-stick"></div></div>
    <div id="hit-btn" onclick="hit()">УДАР</div>
</div>

<canvas id="game"></canvas>

<script>
// --- КОНФИГУРАЦИЯ ---
const firebaseConfig = { apiKey: "AIza...", databaseURL: "https://..." }; // Твои данные сюда
if (firebaseConfig.apiKey !== "AIza...") firebase.initializeApp(firebaseConfig);
const db = (typeof firebase !== 'undefined') ? firebase.database() : null;

let restoName = "", startTime = 0, gameTime = 0, active = false;
let bat = false, hAnim = 0, kCount = 0, refusedOnce = false, isVictory = false;
let vTimer = 0; // Таймер для вышибалы
let diamond = { x: 0, y: 0, active: false };
const names = ["Дима", "Ваня", "Коля"];

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let money = 300, res = {s:20, c:20, m:20};

const room = { x: 50, y: 120, w: 800, h: 500 };
const player = { x: 400, y: 350, r: 20, spd: 5 };
const items = {
    kassa: { lvl: 1, x: 80, y: 320, w: 70, h: 70, name: "Касса", col: "#f1c40f", cost: 100 },
    t1: { lvl: 0, x: 350, y: 220, w: 90, h: 90, name: "Стол 1", col: "#e67e22", cost: 80, status: 'free' },
    t2: { lvl: 0, x: 600, y: 220, w: 90, h: 90, name: "Стол 2", col: "#e67e22", cost: 80, status: 'free' },
    t3: { lvl: 0, x: 350, y: 480, w: 90, h: 90, name: "Стол 3", col: "#e67e22", cost: 80, status: 'free' }
};
let clients = [], NPCs = [{ x: 750, y: 180, type: 'a', name: "Андрюша Директор", t: 0 }];

function initGame() {
    restoName = document.getElementById('resto-input').value;
    if(!restoName) return alert("Введите название!");
    document.getElementById('menu').style.display = 'none';
    active = true; startTime = Date.now();
    spawnDiamond();
    setInterval(() => { if(active) { gameTime = Math.floor((Date.now()-startTime)/1000); document.getElementById('t-val').innerText = gameTime; vTimer++; checkWin(); } }, 1000);
    loop();
}

function spawnDiamond() {
    diamond.x = room.x + Math.random() * (room.w - 40);
    diamond.y = room.y + Math.random() * (room.h - 40);
    diamond.active = true;
}

function update() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    
    // Управление
    let nX = player.x + joy.x * player.spd, nY = player.y + joy.y * player.spd;
    if(nX > room.x+20 && nX < room.x+room.w-20) player.x = nX;
    if(nY > room.y+20 && nY < room.y+room.h-20) player.y = nY;

    // Алмаз
    if(diamond.active && Math.hypot(player.x - diamond.x, player.y - diamond.y) < 30) {
        money += 500; diamond.active = false;
        setTimeout(spawnDiamond, 20000);
        upUI();
    }

    // Андрюша
    NPCs.forEach(n => {
        if(Math.hypot(player.x-n.x, player.y-n.y) < 45 && n.t <= 0) { money += 150; n.t = 1200; upUI(); }
        if(n.t > 0) n.t--;
    });

    // Клиенты (Всегда по 1 на каждый стол)
    Object.values(items).forEach(it => {
        if(it.status === 'free' && it.lvl > 0 && res.s>0 && res.c>0 && res.m>0) {
            it.status = 'busy';
            clients.push({ x: -40, y: 320, st: 'go', target: it, t: 120, name: names[Math.floor(Math.random()*names.length)] });
        }
    });

    clients.forEach((c, i) => {
        if(c.st === 'go') {
            c.x += (c.target.x - c.x) * 0.04; c.y += (c.target.y - c.y) * 0.04;
            if(Math.hypot(c.x-c.target.x, c.y-c.target.y) < 5) c.st = 'eat';
        } else if(c.st === 'eat') {
            c.t--; if(c.t <= 0) { res.s--; res.c--; res.m--; c.st = 'pay'; c.target.status = 'busy_pay'; upUI(); }
        } else if(c.st === 'pay') {
            c.x += (items.kassa.x+35-c.x)*0.06; c.y += (items.kassa.y+35-c.y)*0.06;
            if(Math.hypot(c.x-(items.kassa.x+35), c.y-(items.kassa.y+35))<5) { 
                money += (100 + (c.target.lvl * 100) + (items.kassa.lvl * 100)); 
                c.target.status = 'free'; c.st = 'out'; upUI(); 
                if(vTimer >= 15) { document.getElementById('v-popup').style.display='block'; vTimer = 0; }
            }
        } else { c.x -= 6; if(c.x < -60) clients.splice(i, 1); }
    });

    if(!bat && player.x > room.x+room.w-80 && player.y > room.y+room.h-80) { bat = true; document.getElementById('hit-btn').style.display='flex'; }
}

function draw() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    ctx.fillStyle = "#1e272e"; ctx.fillRect(room.x, room.y, room.w, room.h);
    ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 4; ctx.strokeRect(room.x, room.y, room.w, room.h);
    
    // Алмаз
    if(diamond.active) {
        ctx.fillStyle = "#00d2ff"; ctx.beginPath();
        ctx.moveTo(diamond.x, diamond.y-15); ctx.lineTo(diamond.x+15, diamond.y); ctx.lineTo(diamond.x, diamond.y+15); ctx.lineTo(diamond.x-15, diamond.y); ctx.fill();
    }

    // Предметы
    for(let k in items) {
        let it = items[k]; ctx.fillStyle = it.lvl === 0 ? "#333" : (it.lvl>=20 ? "#27ae60" : it.col);
        ctx.fillRect(it.x, it.y, it.w, it.h);
        ctx.fillStyle = "#fff"; ctx.font = "14px Arial"; 
        ctx.fillText(`${it.name} (${it.lvl})`, it.x, it.y - 25);
        ctx.fillStyle = "#f1c40f"; ctx.font = "12px Arial";
        ctx.fillText(`Улучшить: $${it.cost}`, it.x, it.y - 10);
    }

    // Персонажи
    NPCs.forEach(n => { ctx.fillStyle = n.t > 0 ? "#444" : "#9b59b6"; ctx.beginPath(); ctx.arc(n.x, n.y, 22, 0, Math.PI*2); ctx.fill(); ctx.fillStyle="white"; ctx.fillText("Директор", n.x-30, n.y-30); });
    clients.forEach(c => { 
        ctx.fillStyle = "#3498db"; ctx.beginPath(); ctx.arc(c.x, c.y, 20, 0, Math.PI*2); ctx.fill(); 
        ctx.fillStyle = "white"; ctx.fillText(c.name, c.x-15, c.y-25);
    });
    
    // Игрок и ДУБИНКА
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
    if(bat) {
        ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(hAnim > 0 ? 0.8 : -0.7);
        ctx.fillStyle = "#7f8c8d"; ctx.fillRect(15, -35, 10, 45); // Дубинка
        ctx.fillStyle = "#2c3e50"; ctx.fillRect(15, -5, 10, 15); // Ручка
        ctx.restore(); if(hAnim > 0) hAnim--;
    }
}

let joy = { x: 0, y: 0, on: false };
const jB = document.getElementById('joy-base'), jS = document.getElementById('joy-stick');
jB.addEventListener('touchstart', e => { joy.on = true; });
window.addEventListener('touchmove', e => {
    if(!joy.on) return; let t = e.touches[0], r = jB.getBoundingClientRect(), cx = r.left+55, cy = r.top+55;
    let dx = t.clientX-cx, dy = t.clientY-cy, d = Math.min(Math.hypot(dx,dy), 40), a = Math.atan2(dy,dx);
    joy.x = Math.cos(a)*(d/40); joy.y = Math.sin(a)*(d/40);
    jS.style.transform = `translate(${joy.x*30}px, ${joy.y*30}px)`;
});
window.addEventListener('touchend', () => { joy.on=false; joy.x=0; joy.y=0; jS.style.transform='none'; });

canvas.addEventListener('mousedown', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
    const my = (e.clientY - rect.top) * (canvas.height / rect.height);
    Object.values(items).forEach(it => {
        if(mx > it.x && mx < it.x + it.w && my > it.y && my < it.y + it.h) {
            if(money >= it.cost && it.lvl < 20) { money -= it.cost; it.lvl++; it.cost = Math.floor(it.cost * 1.5); upUI(); }
        }
    });
});

function hit() {
    hAnim = 15; let t = clients.find(c => Math.hypot(c.x-player.x, c.y-player.y) < 70);
    if(t) { if(t.target) t.target.status = 'free'; clients = clients.filter(cl => cl !== t); kCount++; if(kCount >= 5) location.reload(); }
}
function payV(ok) { document.getElementById('v-popup').style.display='none'; if(!ok) refusedOnce = true; else money -= 20; upUI(); }
function upUI() { document.getElementById('m-val').innerText = money; document.getElementById('r-s').innerText = res.s; document.getElementById('r-c').innerText = res.c; document.getElementById('r-m').innerText = res.m; }
function loop() { if(!active) return; update(); draw(); requestAnimationFrame(loop); }
function buyRes(t) { let p = {s:5, c:7, m:10}; if(money >= p[t]) { money -= p[t]; res[t]+=20; upUI(); } }
</script>
</body>
</html>
